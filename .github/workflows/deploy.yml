name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# GITHUB_TOKEN の権限: Pages への書き込みと OIDC トークン発行(deploy-pages が要求)。
permissions:
  contents: read
  pages: write
  id-token: write

# Pages デプロイは1本に直列化する(進行中のデプロイは中断しない)。
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up mise (Node.js 22, pinned in mise.toml)
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: npm install

      # GITHUB_PAGES=1 で vite.config.js が base を `/mizu-ni-naru/` に切り替える
      # (リポジトリ名のサブパス配信に必要)。
      - name: Build (base = /mizu-ni-naru/)
        run: npm run build
        env:
          GITHUB_PAGES: "1"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact (dist/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
